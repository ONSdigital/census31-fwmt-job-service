server:
  port: 8025

spring:
  application:
    name: census31-fwmt-job-service
  main:
    allow-circular-references: true
  security:
    user:
      name: "user"
      password: "password"
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=fwmtg
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
    default-schema: fwmtg
    liquibase-schema: fwmtg
management:
  # Place /info and /health in the root
  endpoints.web.base-path: ''
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: false

logging:
  profile: DEV
  level:
    root: WARN
    uk.gov.ons.census.fwmt: INFO
    org.springframework: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate: INFO
    org.apache.commons.dbcp2: INFO


totalmobile:
  username: "user"
  password: "password"
  baseUrl: "http://localhost:8000/"
  healthcheckPath: "swagger/index.html"
  comet:
    clientID: ""
    clientSecret: ""
    resource: "https://int-ons-comet-api-app-ukwest.azurewebsites.net"
    authority: "https://login.microsoftonline.com/05057611-67c0-4390-85ef-2c623ff4104f/oauth2/v2.0/token"
  operation:
    case:
      create:
        path: "cases/"
rmapi:
  username: "user"
  password: "password"
  baseUrl: "http://localhost:8000/"

decryption:
  # Private key is not bundled in the repo (see docs/gitguardian-pgp-private-key.md).
  # Override via DECRYPTION_PGP / DECRYPTION_PASSWORD or Spring config in each environment.
  pgp: "${DECRYPTION_PGP:file://${user.home}/.fwmt/keys/decryption.private}"
  password: "${DECRYPTION_PASSWORD:}"
 


fwmt:
  workTypes:
    ccs:
      duration: 5
    ce:
      duration: 5
    hh:
      duration: 5
    ohs:
      duration: 5

eq:
  url: "https://fieldservice-ENV_NAME.census-gcp.onsdigital.uk/launch/"

spg:
  followUpDate: 11111

ce:
  followUpDate: "01/05/2020"
  startDate: "01/05/2020"

jobservice:
  transitionRules:
    path: classpath:/transitionRules.txt

resthttp:
  connection:
    timeout: 2000
    requestTimeout: 1000
    socketTimeout: 5000
    pool:
      maxPerRoute: 20
      maxTotal: 100

app:
  testing: false
  messaging:
    provider: rabbit
    destinations:
      rmField: "RM.Field"
      gwField: "GW.Field"
    pubsub:
      rm-field-subscription: job-service-RM-Field
      gw-field-subscription: job-service-GW-Field
  rabbitmq:
    gw:
      username: "guest"
      password: "guest"
      host: "localhost"
      port: 5673
      virtualHost: "/"
      initialInterval: 5000
      multiplier: 3.0
      maxInterval: 45000
      maxRetries: 1
      prefetchCount: 500
      concurrentConsumers: 10
      maxRetryCount: 5
      exchanges:
        error: "GW.Error.Exchange"
      routingkey:
        perm: "gw.permanent.error"
        trans: "gw.transient.error"
      queues:
        errorPer: "GW.Permanent.ErrorQ"
        errorTrans: "GW.Transient.ErrorQ"
        input: "GW.Field"
    #      queues:
    #        error: "GW.ErrorQ"
    rm:
      username: "guest"
      password: "guest"
      host: "localhost"
      port: 5672
      virtualHost: "/"
      initialInterval: 5000
      multiplier: 3.0
      maxInterval: 45000
      maxRetries: 1
      prefetchCount: 500
      concurrentConsumers: 10
      queues:
        rm:
          input: "RM.Field"
#          dlq: "RM.FieldDLQ"
#          exchange: "adapter-outbound-exchange"

---
spring:
  config:
    activate:
      on-property:
        name: app.messaging.provider
        having-value: pubsub
  cloud:
    gcp:
      project-id: ${FWMT_PUBSUB_PROJECT:fwmt-local}
      credentials:
        enabled: false
      pubsub:
        enabled: true
        emulator-host: ${PUBSUB_EMULATOR_HOST:localhost:8085}